name: Daily ICC + Build Website + Deploy Pages

on:
  workflow_dispatch: {}
  schedule:
    - cron: "00 21 * * 1-5"
    - cron: "00 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-icc-pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Decide whether scheduled run should proceed
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NY_HOUR=$(TZ=America/New_York date +%H)
            NY_MIN=$(TZ=America/New_York date +%M)
            # Only the 5pm ET scheduled run should proceed.
            if [ "$NY_HOUR" -eq 17 ]; then
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "Proceeding: New York time is ${NY_HOUR}:${NY_MIN}."
            else
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: New York time is ${NY_HOUR}:${NY_MIN}."
            fi
          else
            # Manual dispatch should always proceed.
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch -> proceed."
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Ensure backend package exists
        run: |
          mkdir -p backend
          if [ ! -f backend/__init__.py ]; then
            echo '"""Backend package for Live ICC data library."""' > backend/__init__.py
          fi
          python - <<'PY'
          import os
          import backend
          print("cwd =", os.getcwd())
          print("backend import OK:", backend.__file__)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip install openpyxl beautifulsoup4 tzdata || true
          else
            pip install pandas numpy yfinance requests lxml html5lib openpyxl beautifulsoup4 python-dateutil tzdata
          fi

      - name: Decide target trading date and whether raw ICC recalculation is needed
        id: guard
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/New_York"))
          data_dir = Path("data")
          snap_re = re.compile(r"^icc_live_usall_(\d{4})_(\d{4})(?:_r\d+)?\.csv$")

          def previous_business_day(d):
              d = d - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          # Before 4pm ET, use the previous business day. After 4pm ET, use today.
          if now.weekday() >= 5:
              target_date = previous_business_day(now.date())
              reason = "weekend"
          elif now.hour < 16:
              target_date = previous_business_day(now.date())
              reason = "before market close"
          else:
              target_date = now.date()
              reason = "after market close"

          latest_valid_date = None
          latest_valid_file = ""
          for p in data_dir.glob("*/*.csv"):
              m = snap_re.match(p.name)
              if not m:
                  continue
              try:
                  if p.stat().st_size <= 0:
                      continue
              except FileNotFoundError:
                  continue
              dt = datetime.strptime(m.group(1) + m.group(2), "%Y%m%d").date()
              if latest_valid_date is None or dt > latest_valid_date:
                  latest_valid_date = dt
                  latest_valid_file = str(p)

          need_recalc = latest_valid_date is None or latest_valid_date < target_date
          print(f"now_et={now.isoformat()}")
          print(f"target_date={target_date.isoformat()}")
          print(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}")
          print(f"latest_valid_usall_file={latest_valid_file}")
          print(f"need_recalc={str(need_recalc).lower()}")
          print(f"reason={reason}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"target_date={target_date.isoformat()}\n")
              f.write(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}\n")
              f.write(f"latest_valid_usall_file={latest_valid_file}\n")
              f.write(f"need_recalc={'true' if need_recalc else 'false'}\n")
              f.write(f"reason={reason}\n")
          PY

      - name: Show guard decision
        run: |
          echo "target_date = ${{ steps.guard.outputs.target_date }}"
          echo "latest_valid_usall_date = ${{ steps.guard.outputs.latest_valid_usall_date }}"
          echo "latest_valid_usall_file = ${{ steps.guard.outputs.latest_valid_usall_file }}"
          echo "need_recalc = ${{ steps.guard.outputs.need_recalc }}"
          echo "reason = ${{ steps.guard.outputs.reason }}"

      - name: Run daily all-market and S&P 500 ICC
        if: steps.guard.outputs.need_recalc == 'true'
        env:
          IGNORE_TIME_GUARD: "0"
          PYTHONPATH: ${{ github.workspace }}
        run: python run_daily_icc.py

      - name: Run extra index ICC
        if: steps.guard.outputs.need_recalc == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m backend.run_extra_indices

      - name: Refresh ETF and Country / Region derived data
        env:
          PYTHONPATH: ${{ github.workspace }}
          FORCE_DERIVED_REFRESH: "1"
        run: python -m backend.ensure_daily_derived --universe usall

      - name: Build website data under docs/data
        env:
          PYTHONPATH: ${{ github.workspace }}
          FORCE_DERIVED_REFRESH: "0"
        run: python -m backend.build_docs_data --universe usall --skip-derived-refresh

      - name: Generate FILES.md manifest if tool exists
        run: |
          if [ -f tools/generate_files_manifest.py ]; then
            python tools/generate_files_manifest.py
          else
            echo "tools/generate_files_manifest.py not found, skip."
          fi

      - name: Commit raw data, derived data, and site data back to repo
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="${BRANCH_NAME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${BRANCH}" || true
          ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          # Commit all raw, derived, docs, zip, and manifest files.
          git add -A data docs backend/__init__.py FILES.md || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ICC raw derived site data ${ts} [skip ci]" || true
            git pull --rebase --autostash origin "${BRANCH}" || true
            git push origin HEAD:"${BRANCH}" || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
