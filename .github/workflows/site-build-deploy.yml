name: Daily ICC + Build Website + Deploy Pages

on:
  workflow_dispatch: {}
  schedule:
    # Run at two UTC times to cover DST changes while only executing during 5pm ET.
    - cron: "00 21 * * 1-5"
    - cron: "00 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-icc-pages
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:    
      - name: Decide whether to run
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            NY_HOUR=$(TZ=America/New_York date +%H)
            NY_MIN=$(TZ=America/New_York date +%M)

            # Only scheduled jobs during 5pm ET should proceed.
            if [ "$NY_HOUR" -eq 17 ]; then
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "Proceeding: NY time is ${NY_HOUR}:${NY_MIN}."
            else
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "Skipping: NY time is ${NY_HOUR}:${NY_MIN}."
            fi
          else
            # Manual dispatch should always proceed.
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch -> proceed."
          fi

  build-and-deploy:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set Python import path
        shell: bash
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy yfinance requests lxml html5lib openpyxl python-dateutil tzdata
          fi

      - name: Decide target trading date and whether recalculation is needed
        id: guard
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          repo = Path(".").resolve()
          data_dir = repo / "data"
          now = datetime.now(ZoneInfo("America/New_York"))
          snap_re = re.compile(r"^icc_live_usall_(\d{4})_(\d{4})(?:_r\d+)?\.csv$")

          def previous_business_day(d):
              d = d - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          # Define the target trading date.
          if now.weekday() >= 5:
              target_date = previous_business_day(now.date())
              timing_reason = "weekend"
          elif now.hour < 16:
              target_date = previous_business_day(now.date())
              timing_reason = "before market close"
          else:
              target_date = now.date()
              timing_reason = "after market close"

          latest_valid_date = None
          latest_valid_file = None
          for p in data_dir.glob("*/*.csv"):
              m = snap_re.match(p.name)
              if not m:
                  continue
              try:
                  if p.stat().st_size <= 0:
                      continue
              except FileNotFoundError:
                  continue
              dt = datetime.strptime(f"{m.group(1)}{m.group(2)}", "%Y%m%d").date()
              if latest_valid_date is None or dt > latest_valid_date:
                  latest_valid_date = dt
                  latest_valid_file = str(p)

          # Recalculate only when the latest valid all-market file is older than the target date.
          need_recalc = (latest_valid_date is None) or (latest_valid_date < target_date)

          print(f"now_et={now.isoformat()}")
          print(f"target_date={target_date.isoformat()}")
          print(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}")
          print(f"latest_valid_usall_file={latest_valid_file or ''}")
          print(f"need_recalc={str(need_recalc).lower()}")
          print(f"reason={timing_reason}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"target_date={target_date.isoformat()}\n")
              f.write(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}\n")
              f.write(f"latest_valid_usall_file={latest_valid_file or ''}\n")
              f.write(f"need_recalc={'true' if need_recalc else 'false'}\n")
              f.write(f"reason={timing_reason}\n")
          PY

      - name: Show guard decision
        run: |
          echo "target_date = ${{ steps.guard.outputs.target_date }}"
          echo "latest_valid_usall_date = ${{ steps.guard.outputs.latest_valid_usall_date }}"
          echo "latest_valid_usall_file = ${{ steps.guard.outputs.latest_valid_usall_file }}"
          echo "need_recalc = ${{ steps.guard.outputs.need_recalc }}"
          echo "reason = ${{ steps.guard.outputs.reason }}"

      - name: Run daily ICC
        if: steps.guard.outputs.need_recalc == 'true'
        env:
          IGNORE_TIME_GUARD: "0"
        run: python run_daily_icc.py

      - name: Run extra indices
        if: steps.guard.outputs.need_recalc == 'true'
        run: python -m backend.run_extra_indices

      - name: Build website data and organized downloads
        run: python -m backend.build_docs_data --universe usall

      - name: Generate FILES.md manifest if tool exists
        shell: bash
        run: |
          if [ -f tools/generate_files_manifest.py ]; then
            python tools/generate_files_manifest.py
          else
            echo "tools/generate_files_manifest.py not found, skip."
          fi

      - name: Commit raw data and site data back to repo
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="${BRANCH_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${BRANCH}" || true

          ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Add all generated raw data, derived data, docs data, and manifests.
          git add -A data docs FILES.md || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ICC downloads and site data ${ts} [skip ci]" || true
            git pull --rebase --autostash origin "${BRANCH}" || true
            git push origin HEAD:"${BRANCH}" || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
