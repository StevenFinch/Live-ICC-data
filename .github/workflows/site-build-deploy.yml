name: Daily ICC + Build Website + Deploy Pages

on:
  workflow_dispatch:
    inputs:
      force_recalc:
        description: "Force recalculation of raw usall/sp500/index ICC snapshots"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_country_adr_rebuild:
        description: "Force rebuild of Country / Region ADR universe"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Run after 5pm US Eastern time all year.
    # 22:10 UTC = 6:10pm EDT in summer and 5:10pm EST in winter.
    - cron: "10 22 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-icc-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Debug workspace
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          echo "Backend directory:"
          ls -la backend || true
          echo "Workflow event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"

      - name: Ensure backend is a package
        run: |
          mkdir -p backend
          if [ ! -f backend/__init__.py ]; then
            echo '"""Backend package for Live ICC data library."""' > backend/__init__.py
          fi
          python - <<'PY'
          import os
          import sys
          print("cwd =", os.getcwd())
          print("PYTHONPATH =", os.environ.get("PYTHONPATH"))
          print("sys.path[0:5] =", sys.path[0:5])
          import backend
          print("backend package import OK:", backend.__file__)
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip install openpyxl tzdata lxml html5lib || true
          else
            pip install pandas numpy yfinance requests lxml html5lib openpyxl python-dateutil tzdata
          fi

      - name: Decide target trading date and whether raw recalculation is needed
        id: guard
        env:
          FORCE_RECALC: ${{ github.event.inputs.force_recalc || 'false' }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          repo = Path(".").resolve()
          data_dir = repo / "data"
          now = datetime.now(ZoneInfo("America/New_York"))

          snap_re = re.compile(r"^icc_live_usall_(\d{4})_(\d{4})(?:_r\d+)?\.csv$")

          def previous_business_day(d):
              d = d - timedelta(days=1)
              while d.weekday() >= 5:
                  d -= timedelta(days=1)
              return d

          # Define the target trading date.
          # Scheduled runs happen after 5pm ET by design.
          # Manual runs before 5pm ET should still target the previous business day.
          if now.weekday() >= 5:
              target_date = previous_business_day(now.date())
              timing_reason = "weekend"
          elif now.hour < 17:
              target_date = previous_business_day(now.date())
              timing_reason = "before 5pm ET"
          else:
              target_date = now.date()
              timing_reason = "after 5pm ET"

          latest_valid_date = None
          latest_valid_file = None

          # Find the latest valid non-empty usall snapshot.
          for p in data_dir.glob("*/*.csv"):
              m = snap_re.match(p.name)
              if not m:
                  continue

              try:
                  if p.stat().st_size <= 0:
                      continue
              except FileNotFoundError:
                  continue

              year = m.group(1)
              mmdd = m.group(2)
              dt = datetime.strptime(f"{year}{mmdd}", "%Y%m%d").date()

              if latest_valid_date is None or dt > latest_valid_date:
                  latest_valid_date = dt
                  latest_valid_file = str(p)

          force_recalc = os.environ.get("FORCE_RECALC", "false").lower() == "true"

          # Recalculate raw ICC only when forced or when the latest valid usall date is older than target.
          need_recalc = force_recalc or (latest_valid_date is None) or (latest_valid_date < target_date)

          print(f"now_et={now.isoformat()}")
          print(f"timing_reason={timing_reason}")
          print(f"target_date={target_date.isoformat()}")
          print(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}")
          print(f"latest_valid_usall_file={latest_valid_file or ''}")
          print(f"force_recalc={str(force_recalc).lower()}")
          print(f"need_recalc={str(need_recalc).lower()}")

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write(f"target_date={target_date.isoformat()}\n")
              f.write(f"latest_valid_usall_date={latest_valid_date.isoformat() if latest_valid_date else ''}\n")
              f.write(f"latest_valid_usall_file={latest_valid_file or ''}\n")
              f.write(f"force_recalc={'true' if force_recalc else 'false'}\n")
              f.write(f"need_recalc={'true' if need_recalc else 'false'}\n")
              f.write(f"reason={timing_reason}\n")
          PY

      - name: Show guard decision
        run: |
          echo "target_date = ${{ steps.guard.outputs.target_date }}"
          echo "latest_valid_usall_date = ${{ steps.guard.outputs.latest_valid_usall_date }}"
          echo "latest_valid_usall_file = ${{ steps.guard.outputs.latest_valid_usall_file }}"
          echo "force_recalc = ${{ steps.guard.outputs.force_recalc }}"
          echo "need_recalc = ${{ steps.guard.outputs.need_recalc }}"
          echo "reason = ${{ steps.guard.outputs.reason }}"

      - name: Run daily ICC raw snapshots
        if: steps.guard.outputs.need_recalc == 'true'
        env:
          IGNORE_TIME_GUARD: "0"
          PYTHONPATH: ${{ github.workspace }}
        run: python run_daily_icc.py

      - name: Run extra index raw snapshots
        if: steps.guard.outputs.need_recalc == 'true'
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m backend.run_extra_indices

      - name: Ensure ETF and Country / Region derived data
        env:
          PYTHONPATH: ${{ github.workspace }}
          COUNTRY_ADR_FORCE_REBUILD: ${{ github.event.inputs.force_country_adr_rebuild || 'false' }}
        run: |
          if [ -f backend/ensure_daily_derived.py ]; then
            python -m backend.ensure_daily_derived
          else
            echo "backend/ensure_daily_derived.py not found."
            echo "This is not fatal, because backend.build_docs_data may still refresh derived data."
          fi

      - name: Build website data under docs/data
        env:
          PYTHONPATH: ${{ github.workspace }}
          COUNTRY_ADR_FORCE_REBUILD: ${{ github.event.inputs.force_country_adr_rebuild || 'false' }}
        run: python -m backend.build_docs_data --universe usall

      - name: Validate generated website data
        run: |
          echo "Checking generated docs/data files..."
          test -s docs/data/marketwide.json
          test -s docs/data/value.json
          test -s docs/data/industry.json
          test -s docs/data/indices.json
          test -s docs/data/etf.json
          test -s docs/data/country.json
          test -s docs/data/downloads_catalog.json
          echo "Generated docs/data files are present."

          echo "Latest derived ETF files:"
          find data/derived/etf -type f -name "*.csv" 2>/dev/null | sort | tail -5 || true

          echo "Latest derived Country / Region files:"
          find data/derived/country_adr -type f -name "*.csv" 2>/dev/null | sort | tail -5 || true

      - name: Generate FILES.md manifest if tool exists
        run: |
          if [ -f tools/generate_files_manifest.py ]; then
            python tools/generate_files_manifest.py
          else
            echo "tools/generate_files_manifest.py not found, skip."
          fi

      - name: Commit raw data and site data back to repo
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="${BRANCH_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${BRANCH}" || true

          ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Add all generated raw data, derived data, docs data, and manifests.
          git add -A data docs backend/__init__.py FILES.md || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ICC raw/site data ${ts} [skip ci]" || true
            git pull --rebase --autostash origin "${BRANCH}" || true
            git push origin HEAD:"${BRANCH}" || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
