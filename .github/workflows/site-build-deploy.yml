
name: Daily ICC + Build Website + Deploy Pages

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: live-icc-site
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas numpy yfinance requests lxml html5lib python-dateutil tzdata
          fi

      - name: Decide whether recalculation is needed
        id: guard
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          import glob, os

          data_dir = Path("data")
          now = datetime.now(ZoneInfo("America/New_York"))

          def prev_business_day(d):
              x = d.date() - timedelta(days=1)
              while x.weekday() >= 5:
                  x -= timedelta(days=1)
              return x

          if now.weekday() >= 5:
              target = prev_business_day(now)
              need = False
              reason = "weekend"
          elif now.hour < 16:
              target = prev_business_day(now)
              need = False
              reason = "before market close"
          else:
              target = now.date()
              yyyymm = target.strftime("%Y%m")
              mmdd = target.strftime("%m%d")
              patt = str(data_dir / yyyymm / f"icc_live_usall_{target.strftime('%Y')}_{mmdd}*.csv")
              files = [p for p in glob.glob(patt) if os.path.getsize(p) > 0]
              need = len(files) == 0
              reason = "after market close"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"target_date={target.strftime('%Y-%m-%d')}\n")
              f.write(f"need_recalc={'true' if need else 'false'}\n")
              f.write(f"reason={reason}\n")
          PY

      - name: Show guard
        run: |
          echo "target_date = ${{ steps.guard.outputs.target_date }}"
          echo "need_recalc = ${{ steps.guard.outputs.need_recalc }}"
          echo "reason = ${{ steps.guard.outputs.reason }}"

      - name: Run base daily ICC
        if: steps.guard.outputs.need_recalc == 'true'
        run: python run_daily_icc.py

      - name: Run extra indices
        if: steps.guard.outputs.need_recalc == 'true'
        run: python backend/run_extra_indices.py

      - name: Build docs data
        run: python backend/build_docs_data.py --universe usall

      - name: Generate FILES.md if tool exists
        run: |
          if [ -f tools/generate_files_manifest.py ]; then
            python tools/generate_files_manifest.py
          else
            echo "skip FILES.md generation"
          fi

      - name: Commit data and docs payload
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data docs FILES.md config || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update ICC site payload [skip ci]" || true
            git pull --rebase --autostash origin "${BRANCH_NAME}" || true
            git push origin HEAD:"${BRANCH_NAME}" || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
